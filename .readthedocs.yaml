version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  commands:
    - pip install uv
    - uv sync --extra docs
    - uv run mkdocs build --config-file mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  fail_on_warning: false

mkdocs:
  configuration: mkdocs.yml

formats:
  - htmlzip
