scenario_id: "raise-brytpunkt"
description: >-
  Counterfactual: raise the statlig inkomstskatt lower britpunkt by 10 percent
  relative to the 2025 baseline. Models the effect of indexing the threshold
  to nominal wage growth rather than price growth.
baseline_year: 2025
behavioural: "full"
overrides:
