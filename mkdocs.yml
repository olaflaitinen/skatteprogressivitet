site_name: Skatteprogressivitet
site_url: https://olaflaitinen.github.io/skatteprogressivitet
site_description: >-
  Static and behavioural microsimulator for Swedish tax progressivity.
  Department of Economics, Stockholm University.
site_author: Gustav Olaf Yunus Laitinen-Fredriksson Lundström Imanov

repo_name: olaflaitinen/skatteprogressivitet
repo_url: https://github.com/olaflaitinen/skatteprogressivitet
edit_uri: edit/main/docs/

copyright: >-
  Copyright 2024-2026 Gustav Olaf Yunus Laitinen-Fredriksson Lundström Imanov.
  Licensed under EUPL-1.2.

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
  - mike:
      version_selector: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/olaflaitinen/skatteprogressivitet
    - icon: fontawesome/solid/graduation-cap
      link: https://www.su.se/english/research/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - About: about.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Methodology:
      - Progressivity Indices: methodology/progressivity.md
      - Elasticity of Taxable Income: methodology/eti.md
  - Legislation:
      - Overview: legislation/overview.md
  - Scenarios: scenarios.md
  - Data Policy: data-policy.md
  - Reproducibility: reproducibility.md
  - Deviations: deviations.md
  - API Reference:
      - Index: api/index.md
      - Package root: api/skatteprogressivitet.md
      - Config: api/config.md
      - Seeds: api/seeds.md
      - Paths: api/paths.md
      - Legislation: api/legislation.md
      - Rules: api/rules.md
      - Simulator: api/simulator.md
      - Behavioural: api/behavioural.md
      - Progressivity: api/progressivity.md
      - Causal: api/causal.md
      - Scenarios: api/scenarios.md
      - Pipelines: api/pipelines.md
      - Reporting: api/reporting.md
      - Ingestion: api/ingestion.md
  - Compliance:
      - EU Compliance: eu-compliance.md
      - GDPR: gdpr.md
      - DPIA Summary: dpia-summary.md
      - Swedish Legal Basis: swedish-legal-basis.md
      - OSOR: osor.md
      - FAIR4RS: fair4rs.md
      - Accessibility: accessibility.md
  - Governance:
      - Governance Model: governance.md
      - Citation: citation.md
      - Glossary: glossary.md
