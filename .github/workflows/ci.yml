name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@e5ac9c8fd4f55c31b55e10e8ca8fe0622d585af5  # v5.4.1
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check src tests
      - name: ruff format
        run: uv run ruff format --check src tests

  typecheck:
    name: Type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@e5ac9c8fd4f55c31b55e10e8ca8fe0622d585af5  # v5.4.1
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: mypy
        run: uv run mypy src

  test:
    name: Test Python ${{ matrix.python }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: astral-sh/setup-uv@e5ac9c8fd4f55c31b55e10e8ca8fe0622d585af5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src/skatteprogressivitet \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v
        env:
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2
        if: matrix.os == 'ubuntu-22.04' && matrix.python == '3.12'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  audit:
    name: Security audit
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: astral-sh/setup-uv@e5ac9c8fd4f55c31b55e10e8ca8fe0622d585af5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: pip-audit
        run: uv run pip-audit --strict
      - name: bandit
        run: uv run bandit -r src -lll

  reuse:
    name: REUSE lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542  # v5.0.0

  build:
    name: Build wheel and sdist
    runs-on: ubuntu-22.04
    needs: [test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: astral-sh/setup-uv@e5ac9c8fd4f55c31b55e10e8ca8fe0622d585af5
        with:
          python-version: "3.12"
      - name: Build
        run: uv build
      - name: Upload dist
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fef5eb30d5f5f2a1b6f5  # v4.6.1
        with:
          name: dist
          path: dist/

  docs:
    name: Build documentation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@e5ac9c8fd4f55c31b55e10e8ca8fe0622d585af5  # v5.4.1
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: uv sync --extra docs
      - name: Build docs
        run: uv run mkdocs build
